name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          # Install only what tests need; full requirements.txt pulls torch
          # which is heavy and unnecessary here.
          pip install pandas pytest ruff

      - name: Lint
        run: ruff check .

      - name: Run pytest
        run: pytest -v
